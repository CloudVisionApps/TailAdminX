name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v2.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
          scope: "@cloudvisionapps"

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build component library
        run: npm run build:lib

      # Repo .npmrc only sets the scope registry; npm publish still needs a token on this line.
      - name: Configure npm auth for publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::Add repository secret NPM_TOKEN: npmjs.com → Access Tokens → Granular (or classic) token with publish permission for package @cloudvisionapps/tailadminx (or the whole @cloudvisionapps scope)."
            exit 1
          fi
          printf '%s\n' "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> "${GITHUB_WORKSPACE}/.npmrc"

      - name: Publish package to npm
        run: npm publish --access public

      - name: Package release artifacts
        run: |
          tar -czf dist.tar.gz dist
          tar -czf dist-lib.tar.gz dist-lib

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist.tar.gz
            dist-lib.tar.gz
